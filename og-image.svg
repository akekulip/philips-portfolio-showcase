<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#111820"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e2a3a" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="#4da8da"/>

  <!-- Terminal prompt decoration -->
  <text x="80" y="180" font-family="'Space Mono', 'Courier New', monospace" font-size="18" fill="#38c172" opacity="0.7">philip@cypher-lab:~$</text>
  <text x="380" y="180" font-family="'Space Mono', 'Courier New', monospace" font-size="18" fill="#6b7f99" opacity="0.7">cat portfolio.md</text>

  <!-- Name -->
  <text x="80" y="280" font-family="'Space Mono', 'Courier New', monospace" font-size="56" font-weight="700" fill="#d4dce8">Philip Akekudaga</text>

  <!-- Role -->
  <text x="80" y="340" font-family="'IBM Plex Sans', sans-serif" font-size="26" fill="#4da8da">PhD Student &amp; Network Security Researcher</text>

  <!-- Details -->
  <text x="80" y="400" font-family="'Space Mono', 'Courier New', monospace" font-size="16" fill="#6b7f99">University of Rhode Island | CYPHER Lab</text>
  <text x="80" y="430" font-family="'Space Mono', 'Courier New', monospace" font-size="16" fill="#6b7f99">P4/SDN | Intel Tofino | ICS/OT Cybersecurity | ML Traffic Classification</text>

  <!-- Tags -->
  <rect x="80" y="470" width="60" height="26" rx="3" fill="rgba(214,158,46,0.15)" stroke="rgba(214,158,46,0.3)" stroke-width="1"/>
  <text x="93" y="488" font-family="'Space Mono', monospace" font-size="12" fill="#d69e2e">P4</text>

  <rect x="152" y="470" width="70" height="26" rx="3" fill="rgba(77,168,218,0.15)" stroke="rgba(77,168,218,0.3)" stroke-width="1"/>
  <text x="165" y="488" font-family="'Space Mono', monospace" font-size="12" fill="#4da8da">SDN</text>

  <rect x="234" y="470" width="130" height="26" rx="3" fill="rgba(56,193,114,0.15)" stroke="rgba(56,193,114,0.3)" stroke-width="1"/>
  <text x="247" y="488" font-family="'Space Mono', monospace" font-size="12" fill="#38c172">Intel Tofino</text>

  <rect x="376" y="470" width="90" height="26" rx="3" fill="rgba(159,122,234,0.15)" stroke="rgba(159,122,234,0.3)" stroke-width="1"/>
  <text x="389" y="488" font-family="'Space Mono', monospace" font-size="12" fill="#9f7aea">Python</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#111820"/>
  <rect x="0" y="580" width="1200" height="1" fill="#1e2a3a"/>
  <circle cx="100" cy="605" r="4" fill="#38c172"/>
  <text x="112" y="610" font-family="'Space Mono', monospace" font-size="12" fill="#3d5068">akekudaga.com</text>

  <!-- Network nodes decoration (right side) -->
  <g opacity="0.15">
    <circle cx="900" cy="200" r="6" fill="#4da8da"/>
    <circle cx="1000" cy="150" r="6" fill="#4da8da"/>
    <circle cx="1050" cy="280" r="6" fill="#4da8da"/>
    <circle cx="950" cy="350" r="6" fill="#38c172"/>
    <circle cx="1100" cy="200" r="6" fill="#4da8da"/>
    <circle cx="850" cy="320" r="6" fill="#38c172"/>
    <line x1="900" y1="200" x2="1000" y2="150" stroke="#4da8da" stroke-width="1"/>
    <line x1="1000" y1="150" x2="1100" y2="200" stroke="#4da8da" stroke-width="1"/>
    <line x1="1100" y1="200" x2="1050" y2="280" stroke="#4da8da" stroke-width="1"/>
    <line x1="1050" y1="280" x2="950" y2="350" stroke="#38c172" stroke-width="1"/>
    <line x1="950" y1="350" x2="850" y2="320" stroke="#38c172" stroke-width="1"/>
    <line x1="850" y1="320" x2="900" y2="200" stroke="#4da8da" stroke-width="1"/>
    <line x1="900" y1="200" x2="1050" y2="280" stroke="#1e2a3a" stroke-width="1"/>
    <line x1="1000" y1="150" x2="950" y2="350" stroke="#1e2a3a" stroke-width="1"/>
  </g>
</svg>
